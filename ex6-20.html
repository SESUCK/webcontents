<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>break 문</title>
    </head>
    <h3>1에서 얼마까지 더해야 3000을 넘는가?</h3>
    <hr>
    <script>
        let i= 0, sum = 0;
        while(1)
        {
            sum += i;
            if(sum >3000)
                break;
            i++;
        }
        document.write(i + "깔즤 더하면 3000을 넘음 : " + sum); 
    </script>
</html>
