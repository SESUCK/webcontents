<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>설문지</title>

    <body>
        <form>

                <h1>설문지</h1>
            </header>
            해당하는 부분에 체크해주세요!

            <section>
                <article>학년

                        <option value = "6">코딩</option>

                    남기고 싶은 말<br><textarea cols = "50" rows = "10">글을 남겨주세요</textarea><br>
                </article>
            </section>

            </footer>
