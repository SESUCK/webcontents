<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>eval</title>
    </head>
    <body>
        <h3>eval()로 수식계산</h3>
        <hr>
        <script>
            let k = prompt("수식을 입력해주세요.");
            n = eval(k);
            document.write(k + " = " + n);
        </script>
    </body>
</html>
