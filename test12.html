<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>어질어질</title>
        <style>
            @keyframes turn
            {
                0% { transform: rotate(0deg);}
                50% { transform: rotate(-90deg);}
                100% { transform: rotate(90deg);}
            }
            img
            {
                animation-name : turn;
                animation-duration: 3s;
                animation-iteration-count: infinite;
            }
        </style>
    </head>
    <body>
        <h3>어지러워요</h3>
        <hr>
        <img src="media/spongebab.png">
    </body>
</html>
