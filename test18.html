<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>1</title>
    </head>
    <body>
        <script>
            let a, b;
            function big (a, b)
            {
                a = parseInt(a);
                b = parseInt(b);

                if (a > b)
                    return a;
                else
                    return b;
            }
        </script>
        <script>
            let c = big("625", "555");
            document.write("큰 수 = " + c);
        </script>
    </body>
</html>
