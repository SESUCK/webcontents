<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>휴일출력</title>
    </head>
    <body>
        <h3>월화수목금토일</h3>
        <hr>
        <script>
            let holiday = prompt("월화수목금토일 중에서 입력하세요.");
            switch(holiday) 
            {
                case "월" : ;
                case "화" : ;
                case "수" : ;
                case "목" : document.write("그날은 출근날입니다."); break;
                case "금" : ;
                case "토" : ;
                case "일" : document.write("그날은 휴일입니다.");
            }
        </script>
    </body>
</html>
