<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>절대 배치</title>
        <style>
            div
            {
                display : inline-block;
                position : absolute;
                border : 1px solid lightgray;
            }
            div > p 
            {
                display: inline-block;
                position : absolute;
                height : 20px;
                width : 15px;
                background : lightgray;
            }
        </style>
    </head>
    <body>
        <h3>Merry Christxmas!</h3>
        <hr>
        <p>예수님이 탄생 우와</p>
        <div>
            <img src = "media/tree.png" width = "200" height = "200" alt = "크리스마스 트리">
            <p style = "left : 90px; top : 30px">M</p>
            <p style = "left : 120px; top : 50px">E</p>
            <p style = "left : 70px; top : 70px">R</p>
            <p style = "left : 130px; top : 80px">R</p>
            <p style = "left : 100px; top : 110px">Y</p>
        </div>
    </body>
</html>
