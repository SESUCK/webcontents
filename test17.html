<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>암호입력</title>
    </head>
    <body>
        <h3>암호를 입력하거라</h3>
        <hr>
        <script>
            while(1)
            {
                let password = prompt("암호.");
                if (password == "you")
                {
                    document.write("통과");
                    break;
                }
            }
        </script>
    </body>
</html>
